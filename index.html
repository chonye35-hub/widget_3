<style>
body {
  margin: 0;
  background: #ffffff;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Galmuri9', monospace;
}

.wrapper {
  position: relative;
  text-align: center;
}

.character {
  width: 180px;
  image-rendering: pixelated;
}

/* 🔥 9-slice 말풍선 */
.bubble {
  position: absolute;
  bottom: 200px;
  left: 50%;
  transform: translateX(-50%);

  display: grid;
  grid-template-columns: auto 1fr auto;
  grid-template-rows: auto 1fr auto;

  font-size: 18px;
  text-align: center;
}

/* 각 조각 */
.bubble div {
  image-rendering: pixelated;
}

/* 코너 */
.tl { background: url("1.png"); width: 32px; height: 32px; }
.t  { background: url("2.png") repeat-x; height: 32px; }
.tr { background: url("3.png"); width: 32px; height: 32px; }

.l  { background: url("4.png") repeat-y; width: 32px; }
.r  { background: url("6.png") repeat-y; width: 32px; }

.bl { background: url("7.png"); width: 32px; height: 32px; }
.b  { background: url("8.png") repeat-x; height: 32px; }
.br { background: url("9.png"); width: 32px; height: 32px; }

/* 가운데 텍스트 영역 */
.center {
  background: white;
  padding: 16px 20px;
  white-space: pre-wrap;
  word-break: keep-all;
}
</style>
