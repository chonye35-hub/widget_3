<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
@font-face {
  font-family: 'Galmuri';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2107@1.1/Galmuri9.woff2') format('woff2');
}

body{
  margin:0;
  background:#ffffff;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-end;
  font-family:'Galmuri', monospace;
}

.container{
  position:relative;
  text-align:center;
}

.character{
  width:200px;
  image-rendering:pixelated;
}

/* ========================= */
/* 💎 NEW 말풍선 구조 */
/* ========================= */

.bubble{
  position:absolute;
  bottom:230px;
  left:50%;
  transform:translateX(-50%);
  display:inline-block;
  padding:40px 60px; /* 🔥 여백 넉넉하게 */
  white-space:nowrap;
  font-size:20px;
  text-align:center;
  image-rendering:pixelated;

  /* 🔥 가운데 배경 반복 */
  background:
    url("2.png") repeat-x top,
    url("8.png") repeat-x bottom,
    url("4.png") repeat-y left,
    url("6.png") repeat-y right,
    #ffffff;

  background-position:
    top left,
    bottom left,
    top left,
    top right;

  background-size:
    25px 25px,
    25px 25px,
    25px 25px,
    25px 25px;
}

/* 코너 */
.bubble::before,
.bubble::after{
  content:"";
  position:absolute;
  width:25px;
  height:25px;
  background-size:contain;
  image-rendering:pixelated;
}

.bubble::before{
  top:0;
  left:0;
  background:url("1.png") no-repeat;
}

.bubble::after{
  top:0;
  right:0;
  background:url("3.png") no-repeat;
}

.corner-bl{
  position:absolute;
  bottom:0;
  left:0;
  width:25px;
  height:25px;
  background:url("7.png") no-repeat;
  image-rendering:pixelated;
}

.corner-br{
  position:absolute;
  bottom:0;
  right:0;
  width:25px;
  height:25px;
  background:url("9.png") no-repeat;
  image-rendering:pixelated;
}

/* 🔥 꼬리 */
.tail{
  position:absolute;
  bottom:-25px;
  left:50%;
  transform:translateX(-50%);
  width:25px;
  height:25px;
  background:url("tail.png") no-repeat;
  image-rendering:pixelated;
}

</style>
</head>

<body>

<div class="container">

  <div class="bubble" id="speech">
    안녕!
    <div class="corner-bl"></div>
    <div class="corner-br"></div>
    <div class="tail"></div>
  </div>

  <img src="character.png" class="character"/>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const text = params.get("text") || "안녕!";
document.getElementById("speech").childNodes[0].nodeValue = text;
</script>

</body>
</html>
