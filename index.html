<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dot Bubble Widget</title>

<!-- 🔥 Galmuri 한글 도트폰트 -->
<link href="https://cdn.jsdelivr.net/npm/galmuri@latest/dist/galmuri.css" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #ffffff;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Galmuri9', monospace;
}

.wrapper {
  position: relative;
  text-align: center;
}

/* 캐릭터 */
.character {
  width: 180px;
  image-rendering: pixelated;
}

/* 🔥 도트 말풍선 */
.bubble {
  position: absolute;
  bottom: 200px;
  left: 50%;
  transform: translateX(-50%);

  background: white;
  border: 4px solid black;
  padding: 16px 20px;

  font-size: 18px;
  line-height: 1.6;

  max-width: 320px; /* 너무 길어지지 않게 */
  word-break: keep-all;
  white-space: pre-wrap; /* %0A 줄바꿈 지원 */
  text-align: left;
}

/* 🔥 도트 계단 꼬리 */
.tail {
  position: absolute;
  bottom: 184px;
  left: 50%;
  transform: translateX(-50%);
  width: 8px;
  height: 8px;
  background: black;
  box-shadow:
    8px 8px 0 0 black,
    16px 16px 0 0 black,
    8px 8px 0 4px white,
    16px 16px 0 4px white;
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="bubble" id="bubble">...</div>
  <div class="tail"></div>
  <img src="character.png" class="character">
</div>

<script>
const params = new URLSearchParams(window.location.search);
const text = params.get("text") || "안녕!";
document.getElementById("bubble").innerText = decodeURIComponent(text);
</script>

</body>
</html>
