<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>9-Slice Dot Bubble</title>

<link href="https://cdn.jsdelivr.net/npm/galmuri@latest/dist/galmuri.css" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #ffffff;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Galmuri9', monospace;
}

.wrapper {
  position: relative;
  text-align: center;
}

/* 캐릭터 */
.character {
  width: 180px;
  image-rendering: pixelated;
}

/* 🔥 말풍선 */
.bubble {
  position: absolute;
  bottom: 240px;
  left: 50%;
  transform: translateX(-50%);

  display: grid;
  grid-template-columns: 25px auto 25px;
  grid-template-rows: 25px auto 25px;
}

/* 모든 조각 */
.bubble div {
  width: 25px;
  height: 25px;
  image-rendering: pixelated;
  background-size: 25px 25px;
}

/* 코너 */
.tl { background: url("1.png") no-repeat; }
.tr { background: url("3.png") no-repeat; }
.bl { background: url("7.png") no-repeat; }
.br { background: url("9.png") no-repeat; }

/* 상하 반복 */
.t { background: url("2.png") repeat-x; }
.b { background: url("8.png") repeat-x; }

/* 좌우 반복 */
.l { background: url("4.png") repeat-y; }
.r { background: url("6.png") repeat-y; }

/* 가운데 텍스트 */
.center {
  background: white;
  padding: 14px 20px;
  font-size: 18px;
  text-align: center;
  white-space: pre-wrap;
  word-break: keep-all;
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="bubble">
    <div class="tl"></div>
    <div class="t"></div>
    <div class="tr"></div>

    <div class="l"></div>
    <div class="center" id="bubbleText">...</div>
    <div class="r"></div>

    <div class="bl"></div>
    <div class="b"></div>
    <div class="br"></div>
  </div>

  <img src="character.png" class="character">

</div>

<script>
const params = new URLSearchParams(window.location.search);
const text = params.get("text") || "안녕!";
document.getElementById("bubbleText").innerText = decodeURIComponent(text);
</script>

</body>
</html>
