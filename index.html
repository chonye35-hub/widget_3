<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2107@1.1/Galmuri9.css" rel="stylesheet">

<style>
body{
  margin:0;
  background:#ffffff;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Galmuri9', monospace;
  overflow:hidden;
}

/* 🔥 스케일 기준 박스 */
.wrapper{
  width:500px;   /* 🔥 기준 디자인 폭 */
  transform-origin: top center;
}

/* 중앙정렬 */
.container{
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* 말풍선 */
.bubble{
  display:inline-block;
  padding:50px 80px 42px 80px;
  font-size:20px;
  text-align:center;
  white-space:pre-line;
  position:relative;
  margin-bottom:30px;

  background:
    url("2.png") repeat-x top,
    url("8.png") repeat-x bottom,
    url("4.png") repeat-y left,
    url("6.png") repeat-y right,
    #ffffff;

  background-size:25px 25px;
  image-rendering:pixelated;
}

.bubble::before,
.bubble::after{
  content:"";
  position:absolute;
  width:25px;
  height:25px;
  image-rendering:pixelated;
}

.bubble::before{
  top:0;
  left:0;
  background:url("1.png") no-repeat;
}

.bubble::after{
  top:0;
  right:0;
  background:url("3.png") no-repeat;
}

.corner-bl{
  position:absolute;
  bottom:0;
  left:0;
  width:25px;
  height:25px;
  background:url("7.png") no-repeat;
  image-rendering:pixelated;
}

.corner-br{
  position:absolute;
  bottom:0;
  right:0;
  width:25px;
  height:25px;
  background:url("9.png") no-repeat;
  image-rendering:pixelated;
}

.character{
  width:200px;
  image-rendering:pixelated;
}
</style>
</head>

<body>

<div class="wrapper" id="wrapper">
  <div class="container">

    <div class="bubble" id="speech">
      안녕!
      <div class="corner-bl"></div>
      <div class="corner-br"></div>
    </div>

    <img src="character.png" class="character"/>

  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
let text = params.get("text") || "안녕!";
text = text.replace(/\\n/g, "\n");
document.getElementById("speech").childNodes[0].nodeValue = text;

/* 🔥 자동 스케일 계산 */
function resize() {
  const wrapper = document.getElementById("wrapper");
  const scale = window.innerWidth / 500; 
  wrapper.style.transform = `scale(${scale})`;
}

resize();
window.addEventListener("resize", resize);
</script>

</body>
</html>
