<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- 갈무리 폰트 정상 적용 -->
<style>
@font-face {
  font-family: 'Galmuri';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2107@1.1/Galmuri9.woff2') format('woff2');
  font-weight: normal;
  font-style: normal;
}

body{
  margin:0;
  background:#ffffff;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Galmuri', monospace;
}

.container{
  text-align:center;
  position:relative;
}

.character{
  width:200px;
  image-rendering:pixelated;
  margin-bottom:20px;
}

/* ========================= */
/* 💎 말풍선 */
/* ========================= */

.bubble{
  display:inline-block;
  padding:50px 80px; /* 🔥 여백 넉넉 */
  font-size:20px;
  text-align:center;
  white-space:pre-line; /* 🔥 엔터 지원 */
  image-rendering:pixelated;
  position:relative;

  /* 테두리 반복 */
  background:
    url("2.png") repeat-x top,
    url("8.png") repeat-x bottom,
    url("4.png") repeat-y left,
    url("6.png") repeat-y right,
    #ffffff;

  background-position:
    top left,
    bottom left,
    top left,
    top right;

  background-size:
    25px 25px,
    25px 25px,
    25px 25px,
    25px 25px;
}

/* 코너 */
.bubble::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:25px;
  height:25px;
  background:url("1.png") no-repeat;
  image-rendering:pixelated;
}

.bubble::after{
  content:"";
  position:absolute;
  top:0;
  right:0;
  width:25px;
  height:25px;
  background:url("3.png") no-repeat;
  image-rendering:pixelated;
}

.corner-bl{
  position:absolute;
  bottom:0;
  left:0;
  width:25px;
  height:25px;
  background:url("7.png") no-repeat;
  image-rendering:pixelated;
}

.corner-br{
  position:absolute;
  bottom:0;
  right:0;
  width:25px;
  height:25px;
  background:url("9.png") no-repeat;
  image-rendering:pixelated;
}
</style>
</head>

<body>

<div class="container">

  <!-- 🔽 캐릭터 위 -->
  <img src="character.png" class="character"/>

  <!-- 🔽 말풍선 아래로 이동 -->
  <div class="bubble" id="speech">
    안녕!
    <div class="corner-bl"></div>
    <div class="corner-br"></div>
  </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
let text = params.get("text") || "안녕!";

/* 🔥 엔터 처리 */
text = text.replace(/\\n/g, "\n");

document.getElementById("speech").childNodes[0].nodeValue = text;
</script>

</body>
</html>
